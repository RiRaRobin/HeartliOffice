id: T-2026-02-13-001
beschreibung: 'SRAC Am ergänzen - HB Anpassung?

  Mir kommt gerade in den Sinn. Bei der Am kann der LF bei der Zugdateneingabe für
  die Fahrzeuglänge einen Wert grösser als 750m eingeben. gem. FDV ist ja im normalfall
  bis 750m. Die BLS möchte aber auch FZ zb aus einem Tunnel schleppen können die bereits
  750m lang sind + könnte es sein dass sich hier etwas ändert. Sollten wir hier ein
  SRAC definieren der die Verantwortung zum Betreiber spielt?'
